syntax = "proto3";

package dssa;

option go_package = "./dssagrpc";

service DataStorageSystem {
    rpc List(Path) returns (DataEntries) {}
    rpc Stat(Path) returns (DataEntry) {}
    rpc Mkdir(DataEntry) returns (Empty) {}
    rpc SetStat(DataEntry) returns (Empty) {}
    rpc Put(stream PushedBlock) returns (Length) {}
    rpc Get(Path) returns (stream PulledBlock) {}
    rpc Symlink(OldNewPaths) returns (Empty) {}
}

message Path {
    repeated string path = 1;
}

message OldNewPaths {
    repeated string old = 1;
    repeated string new_ = 2;
}

message DataEntries {
    repeated DataEntry entries = 1;
}

message DataEntry {
    bool is_dir = 1;
    Path path = 2;
    int64 size = 3;
    int64 mtime = 4;
    int32 user = 5;
    Rights user_rights = 6;
    int32 group = 7;
    Rights group_rights = 8;
    Rights other_rights = 9;
    bool is_sym_link = 10;
    string sym_link_target = 11;
    string error = 12;
    bool err_not_exist = 13;
}

message Rights {
    bool read = 1;
    bool write = 2;
    bool execute = 3;
}

message PushedBlock {
    Path path = 1;
    bytes Data = 2;
}

message PulledBlock {
    bytes Data = 1;
}

message Length {
    int64 length = 1;
}

message Empty {
}
