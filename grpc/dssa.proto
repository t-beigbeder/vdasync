syntax = "proto3";

package dssa;

option go_package = "./dssagrpc";

service DataStorageSystem {
	rpc NewSession(Empty) returns (Empty) {}
	rpc EndSession(Empty) returns (Empty) {}
    rpc List(Path) returns (DataEntries) {}
    rpc Stat(Path) returns (DataEntry) {}
    rpc Mkdir(DataEntry) returns (Empty) {}
    rpc SetStat(SetStatDataEntry) returns (Empty) {}
    rpc Put(stream PushedBlock) returns (Length) {}
    rpc Get(Path) returns (stream PulledBlock) {}
    rpc Rm(Path) returns (Empty) {}
    rpc Symlink(OldNewPaths) returns (Empty) {}
}

message Path {
    string path = 1;
}

message OldNewPaths {
    string old = 1;
    string new_ = 2;
}

message DataEntries {
    repeated DataEntry entries = 1;
}

message DataEntry {
    bool is_dir = 1;
    string path = 2;
    int64 size = 3;
    int64 mtime = 4;
    int32 user = 5;
    Rights user_rights = 6;
    int32 group = 7;
    Rights group_rights = 8;
    Rights other_rights = 9;
    bool no_lstat = 15;
    bool is_sym_link = 10;
    string sym_link_target = 11;
    string error = 12;
    bool err_not_exist = 13;
    string id = 14;
}

message SetStatDataEntry {
    DataEntry data_entry = 1;
    bool no_perm = 2;
    bool no_mtime = 3;
}

message Rights {
    bool read = 1;
    bool write = 2;
    bool execute = 3;
}

message PushedBlock {
    string path = 1;
    bytes Data = 2;
}

message PulledBlock {
    bytes Data = 1;
}

message Length {
    int64 length = 1;
}

message Empty {
}

message Paths {
    repeated string paths = 1;
}

message MetaEntries {
    map<string, DataEntry> Entries = 1;
    map<string, Paths> Dirs = 2;
}